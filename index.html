<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שוק האנרגיה והמלחמה - Interactive Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }

        /* The new Back Button */
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background-color: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none; /* Hidden by default */
            transition: background-color 0.2s;
        }

        #back-btn:hover { background-color: #00f2fe; color: #1e1e2f; }

        #info-panel {
            position: absolute;
            top: 0;
            left: -450px;
            width: 400px;
            height: 100vh;
            background-color: #2a2a40;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease-in-out;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }

        #info-panel.open { left: 0; }
        
        h2 { margin-top: 0; color: #4facfe; font-size: 24px; line-height: 1.2; }
        p { line-height: 1.6; font-size: 16px; color: #d1d1e0; }
        
        p a { color: #00f2fe; text-decoration: none; font-weight: bold; }
        p a:hover { text-decoration: underline; }
        
        .close-btn {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            float: left;
            font-weight: bold;
        }
        .close-btn:hover { background-color: #ff1c1c; }

        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: fill 0.2s, stroke-width 0.2s;
        }
        
        .node circle:hover { 
            fill: #00f2fe !important; 
            stroke-width: 4px;
        }
        
        .node text {
            font-size: 14px;
            fill: white;
            pointer-events: none; 
            font-weight: bold;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        
        .link {
            stroke: #666;
            stroke-opacity: 0.6;
            stroke-width: 2px;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/noal-alex/noal_interactive_sites/refs/heads/main/logo_100.png" alt="לוגו התנועה" style="position: absolute; top: 20px; right: 20px; width: 300px; z-index: 100;">
    
    <button id="back-btn" onclick="goBack()">חזור לשכבה הקודמת</button>

    <svg id="graph-container" width="100vw" height="100vh"></svg>

    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">X</button>
        <h2 id="panel-title">נושא</h2>
        <p id="panel-text">מידע יופיע כאן.</p>
        <div id="panel-video"></div>
    </div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph-container");
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
            
        svg.call(zoom);
        
        // Group containers so links always render behind nodes
        const linksGroup = g.append("g").attr("class", "links");
        const nodesGroup = g.append("g").attr("class", "nodes");

        // UI Panel Functions
        function openPanel(data) {
            document.getElementById("panel-title").innerText = data.id;
            document.getElementById("panel-text").innerHTML = data.text || "אין מידע זמין.";
            
            const videoContainer = document.getElementById("panel-video");
            if (data.video) {
                videoContainer.innerHTML = `<iframe width="100%" height="200" src="${data.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = "";
            }
            document.getElementById("info-panel").classList.add("open");
        }

        function closePanel() {
            document.getElementById("info-panel").classList.remove("open");
            document.getElementById("panel-video").innerHTML = ""; 
        }

        // --- Data & State Management ---
        let allNodes = [];
        let allLinks = [];
        let simulation;
        
        let currentCenterId = null;
        let navigationHistory = []; // Tracks the path so we can go back

        // Load external JSON data
        d3.json("data.json").then(function(graphData) {
            allNodes = graphData.nodes;
            allLinks = graphData.links;

            // Initialize simulation (empty at first)
            simulation = d3.forceSimulation()
                .force("link", d3.forceLink().id(d => d.id).distance(220))
                .force("charge", d3.forceManyBody().strength(-2500))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 40));

            // Set the initial root node (Assuming the first node in your JSON is the root)
            if (allNodes.length > 0) {
                currentCenterId = allNodes[0].id;
                updateGraph(currentCenterId);
            }

        }).catch(function(error) {
            console.error("Error loading the JSON data:", error);
        });

        // Function to filter and update the graph based on the chosen center node
        function updateGraph(centerNodeId) {
            
            // 1. Filter links connected to the center node
            let activeLinks = allLinks.filter(l => {
                let sourceId = l.source.id || l.source;
                let targetId = l.target.id || l.target;
                return sourceId === centerNodeId || targetId === centerNodeId;
            });

            // 2. Filter nodes involved in those links (plus the center node itself)
            let activeNodeIds = new Set([centerNodeId]);
            activeLinks.forEach(l => {
                activeNodeIds.add(l.source.id || l.source);
                activeNodeIds.add(l.target.id || l.target);
            });
            let activeNodes = allNodes.filter(n => activeNodeIds.has(n.id));

            // 3. Update the visual Links using D3 .join()
            const linkSelection = linksGroup.selectAll(".link")
                .data(activeLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);

            const linkElements = linkSelection.join(
                enter => enter.append("line").attr("class", "link").attr("stroke-opacity", 0).call(enter => enter.transition().duration(500).attr("stroke-opacity", 0.6)),
                update => update,
                exit => exit.transition().duration(300).attr("stroke-opacity", 0).remove()
            );

            // 4. Update the visual Nodes using D3 .join()
            const nodeSelection = nodesGroup.selectAll(".node")
                .data(activeNodes, d => d.id);

            const nodeEnter = nodeSelection.enter().append("g")
                .attr("class", "node")
                .attr("transform", `translate(${width/2},${height/2})`) // Spawns from center
                .attr("opacity", 0)
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            nodeEnter.append("circle")
                .attr("r", 0)
                .attr("fill", d => d.color)
                .on("click", (event, d) => handleNodeClick(d));

            nodeEnter.append("text")
                .attr("dy", d => d.radius + 20)
                .attr("text-anchor", "middle")
                .text(d => d.id)
                .style("opacity", 0);

            const nodeElements = nodeEnter.merge(nodeSelection);

            // Animate properties (make current center bigger)
            nodeElements.transition().duration(500).attr("opacity", 1);
            nodeElements.select("circle").transition().duration(500)
                .attr("r", d => d.id === centerNodeId ? d.radius * 1.5 : d.radius); // Center circle is 50% larger
            nodeElements.select("text").transition().duration(500)
                .attr("dy", d => (d.id === centerNodeId ? d.radius * 1.5 : d.radius) + 20)
                .style("opacity", 1);

            nodeSelection.exit()
                .transition().duration(300)
                .attr("opacity", 0)
                .remove();

            // 5. Update the simulation data
            simulation.nodes(activeNodes);
            simulation.force("link").links(activeLinks);
            simulation.alpha(1).restart();

            // 6. Tick function
            simulation.on("tick", () => {
                linkElements
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            // 7. Auto-zoom to center the new configuration
            svg.transition().duration(750).call(
                zoom.transform, 
                d3.zoomIdentity.translate(width/2, height/2).scale(0.85).translate(-width/2, -height/2)
            );
        }

        // Logic for clicking a node
        function handleNodeClick(d) {
            openPanel(d); // Open info panel

            // If we click a child node (not the current center), drill down into it
            if (d.id !== currentCenterId) {
                // Add current to history
                navigationHistory.push(currentCenterId);
                // Set new center
                currentCenterId = d.id;
                
                // Show Back button
                document.getElementById("back-btn").style.display = "block";
                
                // Redraw graph
                updateGraph(currentCenterId);
            }
        }

        // Logic for clicking the Back button
        function goBack() {
            if (navigationHistory.length > 0) {
                // Pop the last node out of history
                currentCenterId = navigationHistory.pop();
                
                // Hide button if we are back at the start
                if (navigationHistory.length === 0) {
                    document.getElementById("back-btn").style.display = "none";
                }
                
                // Redraw graph
                updateGraph(currentCenterId);
            }
        }

        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    </script>
</body>
</html>
