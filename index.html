<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שוק האנרגיה והמלחמה - Interactive Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }

        #info-panel {
            position: absolute;
            top: 0;
            right: -100%; 
            width: 600px; 
            max-width: 100%; 
            height: 100vh;
            background-color: #2a2a40;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
            overflow-y: auto;
        }

        #info-panel.open { right: 0; }
        
        h2 { margin-top: 0; color: #4facfe; font-size: 26px; line-height: 1.2; border-bottom: 2px solid #4facfe; padding-bottom: 10px; }
        #panel-text { line-height: 1.8; font-size: 17px; color: #d1d1e0; margin-top: 20px; }
        
        #panel-text b { color: #4facfe; }
        p a { color: #00f2fe; text-decoration: none; font-weight: bold; }
        p a:hover { text-decoration: underline; }
        
        .close-btn {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: left;
            font-weight: bold;
            transition: background 0.2s;
        }
        .close-btn:hover { background-color: #ff1c1c; }

        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: fill 0.2s, stroke-width 0.2s;
        }
        
        .node circle:hover { 
            fill: #00f2fe !important; 
            stroke-width: 4px;
        }
        
        .node text {
            font-size: 14px;
            fill: white;
            pointer-events: none; 
            font-weight: bold;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        
        .link {
            stroke: #666;
            stroke-opacity: 0.4;
            stroke-width: 2px;
        }

        @media (max-width: 768px) {
            #info-panel { padding: 20px; }
            .node text { font-size: 12px; }
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/noal-alex/noal_interactive_sites/refs/heads/main/assets/logo_100.png" 
         alt="לוגו התנועה" 
         style="position: absolute; top: 20px; left: 20px; width: 220px; max-width: 35%; z-index: 100;">
    
    <svg id="graph-container" width="100vw" height="100vh"></svg>

    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">סגור X</button>
        <h2 id="panel-title" style="margin-top: 50px;">נושא</h2>
        <div id="panel-text">מידע יופיע כאן.</div>
        <div id="panel-video" style="margin-top: 25px;"></div>
    </div>

    <script>
        const nodesCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=0&single=true&output=csv"; 
        const linksCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=389930858&single=true&output=csv";

        let width = window.innerWidth;
        let height = window.innerHeight;

        const svg = d3.select("#graph-container");
        const g = svg.append("g");
        // Define a reusable circular clip path that scales to the element's bounding box
        const defs = svg.append("defs");
        defs.append("clipPath")
            .attr("id", "circle-clip")
            .attr("clipPathUnits", "objectBoundingBox")
            .append("circle")
            .attr("cx", 0.5)
            .attr("cy", 0.5)
            .attr("r", 0.5);
        
        const zoom = d3.zoom()
            .scaleExtent([0.2, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
            
        svg.call(zoom);
        
        const linksGroup = g.append("g").attr("class", "links");
        const nodesGroup = g.append("g").attr("class", "nodes");

        function openPanel(data) {
            document.getElementById("panel-title").innerText = data.id;
            document.getElementById("panel-text").innerHTML = data.text || "אין מידע זמין.";
            const videoContainer = document.getElementById("panel-video");
            if (data.video && data.video.trim() !== "") {
                videoContainer.innerHTML = `<iframe width="100%" height="315" src="${data.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = "";
            }
            document.getElementById("info-panel").classList.add("open");
        }

        function closePanel() {
            document.getElementById("info-panel").classList.remove("open");
            document.getElementById("panel-video").innerHTML = ""; 
        }

        let allNodes = [];
        let allLinks = [];
        let simulation;
        let currentCenterId = null;

        Promise.all([d3.csv(nodesCsvUrl), d3.csv(linksCsvUrl)]).then(function(files) {
            allNodes = files[0].map(d => {
                d.id = d.id ? d.id.trim() : "";
                d.radius = +d.radius || 30;
                return d;
            }).filter(d => d.id !== "");
            
            let validNodeIds = new Set(allNodes.map(n => n.id));
            allLinks = files[1].map(d => {
                d.source = d.source ? d.source.trim() : "";
                d.target = d.target ? d.target.trim() : "";
                return d;
            }).filter(d => validNodeIds.has(d.source) && validNodeIds.has(d.target));

            simulation = d3.forceSimulation()
                .force("link", d3.forceLink().id(d => d.id).distance(180))
                .force("charge", d3.forceManyBody().strength(-800))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 50))
                .alphaDecay(0.07);

            if (allNodes.length > 0) {
                currentCenterId = allNodes[0].id;
                updateGraph(currentCenterId);
            }
        });

        function updateGraph(centerNodeId) {
            let activeLinks = allLinks.filter(l => (l.source.id || l.source) === centerNodeId || (l.target.id || l.target) === centerNodeId);
            let activeNodeIds = new Set([centerNodeId]);
            activeLinks.forEach(l => {
                activeNodeIds.add(l.source.id || l.source);
                activeNodeIds.add(l.target.id || l.target);
            });
            let activeNodes = allNodes.filter(n => activeNodeIds.has(n.id));

            const linkSelection = linksGroup.selectAll(".link").data(activeLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            const linkElements = linkSelection.join(
                enter => enter.append("line").attr("class", "link").attr("stroke-opacity", 0).call(e => e.transition().duration(500).attr("stroke-opacity", 0.6)),
                update => update,
                exit => exit.transition().duration(300).attr("stroke-opacity", 0).remove()
            );

            const nodeSelection = nodesGroup.selectAll(".node").data(activeNodes, d => d.id);
            const nodeEnter = nodeSelection.enter().append("g")
                .attr("class", "node")
                .attr("transform", `translate(${width/2},${height/2})`)
                .attr("opacity", 0)
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

            nodeEnter.append("circle").attr("r", 0).attr("fill", d => d.color || "#4facfe").on("click", (e, d) => handleNodeClick(d));

            // ADD THIS: Append the image on top of the circle
            nodeEnter.append("image")
                .attr("href", d => d.image ? d.image.trim() : "") // Pulls from your Sheet
                .attr("clip-path", "url(#circle-clip)") // Applies the perfect circle crop
                .attr("preserveAspectRatio", "xMidYMid slice") // Ensures the image fills the circle without squishing
                .style("pointer-events", "none"); // CRUCIAL: Allows clicks and hovers to pass through to the circle underneath
            
            nodeEnter.append("text").attr("dy", d => d.radius + 20).attr("text-anchor", "middle").text(d => d.id).style("opacity", 0);

            const nodeElements = nodeEnter.merge(nodeSelection);
            nodeElements.transition().duration(500).attr("opacity", 1);
            nodeElements.select("circle").transition().duration(500).attr("r", d => d.id === centerNodeId ? d.radius * 1.4 : d.radius);
            // ADD THIS: Animate the image size and position
            nodeElements.select("image").transition().duration(500)
                .attr("x", d => d.id === centerNodeId ? -d.radius * 1.4 : -d.radius)
                .attr("y", d => d.id === centerNodeId ? -d.radius * 1.4 : -d.radius)
                .attr("width", d => d.id === centerNodeId ? d.radius * 2.8 : d.radius * 2)
                .attr("height", d => d.id === centerNodeId ? d.radius * 2.8 : d.radius * 2);
            nodeElements.select("text").transition().duration(500).attr("dy", d => (d.id === centerNodeId ? d.radius * 1.4 : d.radius) + 25).style("opacity", 1);

            nodeSelection.exit().transition().duration(300).attr("opacity", 0).remove();

            simulation.nodes(activeNodes);
            simulation.force("link").links(activeLinks);
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            // --- SMART ZOOM LOGIC ---
            // We wait a tiny bit for the simulation to start spreading nodes, then fit to screen
            setTimeout(() => fitToNodes(activeNodes), 100);
        }

        function fitToNodes(nodes) {
            if (nodes.length === 0) return;

            // Calculate the bounding box of the active nodes
            let minX = d3.min(nodes, d => d.x - d.radius - 50);
            let maxX = d3.max(nodes, d => d.x + d.radius + 50);
            let minY = d3.min(nodes, d => d.y - d.radius - 50);
            let maxY = d3.max(nodes, d => d.y + d.radius + 80); // Extra space for labels

            let graphW = maxX - minX;
            let graphH = maxY - minY;
            let centerX = (minX + maxX) / 2;
            let centerY = (minY + maxY) / 2;

            // Fills ~65% of the screen
            let scale = 0.65 / Math.max(graphW / window.innerWidth, graphH / window.innerHeight);
            
            svg.transition().duration(800).ease(d3.easeCubicInOut).call(
                zoom.transform, 
                d3.zoomIdentity
                    .translate(window.innerWidth / 2, window.innerHeight / 2)
                    .scale(scale)
                    .translate(-centerX, -centerY)
            );
        }

        function handleNodeClick(d) {
            let connectionCount = allLinks.filter(l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id).length;
            if (d.id !== currentCenterId && connectionCount > 1) {
                currentCenterId = d.id;
                updateGraph(currentCenterId);
                closePanel(); 
            } else {
                openPanel(d);
            }
        }

        function dragstarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
        function dragended(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

        window.addEventListener("resize", () => {
            width = window.innerWidth; height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
            if (simulation) {
                simulation.force("center", d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        });
    </script>
</body>
</html>
