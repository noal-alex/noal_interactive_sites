<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שוק האנרגיה והמלחמה - Interactive Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }

        #info-panel {
            position: absolute;
            top: 0;
            left: -450px;
            width: 400px;
            height: 100vh;
            background-color: #2a2a40;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease-in-out;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }

        #info-panel.open { left: 0; }
        
        h2 { margin-top: 0; color: #4facfe; font-size: 24px; line-height: 1.2; }
        p { line-height: 1.6; font-size: 16px; color: #d1d1e0; }
        
        /* Styling for the article links inside the text */
        p a { color: #00f2fe; text-decoration: none; font-weight: bold; }
        p a:hover { text-decoration: underline; }
        
        .close-btn {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            float: left;
            font-weight: bold;
        }
        .close-btn:hover { background-color: #ff1c1c; }

        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: fill 0.2s, transform 0.2s;
        }
        
        .node circle:hover { 
            fill: #00f2fe !important; 
            transform: scale(1.05);
        }
        
        .node text {
            font-size: 14px;
            fill: white;
            pointer-events: none; 
            font-weight: bold;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        
        .link {
            stroke: #666;
            stroke-opacity: 0.6;
            stroke-width: 2px;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/noal-alex/noal_interactive_sites/refs/heads/main/logo_100.png" alt="לוגו התנועה" style="position: absolute; top: 20px; right: 20px; width: 300px; z-index: 100;">
    <svg id="graph-container" width="100vw" height="100vh"></svg>

    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">X</button>
        <h2 id="panel-title">נושא</h2>
        <p id="panel-text">מידע יופיע כאן.</p>
        <div id="panel-video"></div>
    </div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph-container");
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
            
        svg.call(zoom);
        svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.8).translate(-width/2, -height/2));

        // Global functions for the info panel
        function openPanel(data) {
            document.getElementById("panel-title").innerText = data.id;
            
            // Using innerHTML allows clickable <a> links inside the text
            document.getElementById("panel-text").innerHTML = data.text;
            
            const videoContainer = document.getElementById("panel-video");
            if (data.video) {
                videoContainer.innerHTML = `<iframe width="100%" height="200" src="${data.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = "";
            }
            
            document.getElementById("info-panel").classList.add("open");
        }

        function closePanel() {
            document.getElementById("info-panel").classList.remove("open");
            document.getElementById("panel-video").innerHTML = ""; 
        }

        // Load external JSON data
        d3.json("data.json").then(function(graphData) {
            
            const simulation = d3.forceSimulation(graphData.nodes)
                .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(180))
                .force("charge", d3.forceManyBody().strength(-2000))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 30));

            const link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(graphData.links)
                .enter().append("line")
                .attr("class", "link");

            const node = g.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(graphData.nodes)
                .enter().append("g")
                .attr("class", "node")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            node.append("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.color)
                .on("click", (event, d) => openPanel(d));

            node.append("text")
                .attr("dy", d => d.radius + 20)
                .attr("text-anchor", "middle")
                .text(d => d.id);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }

            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

        }).catch(function(error) {
            console.error("Error loading the JSON data:", error);
        });
    </script>
</body>
</html>
