<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שוק האנרגיה והמלחמה - Interactive Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        
        body:active {
            cursor: grabbing;
        }

        /* Right-side dynamic panel */
        #info-panel {
            position: absolute;
            top: 0;
            right: -100%; /* Hidden off-screen to the right */
            width: 600px; 
            max-width: 100%; /* Becomes full-width on mobile */
            height: 100vh;
            background-color: #2a2a40;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
            overflow-y: auto;
        }

        #info-panel.open { right: 0; }
        
        h2 { margin-top: 0; color: #4facfe; font-size: 24px; line-height: 1.2; }
        p { line-height: 1.6; font-size: 16px; color: #d1d1e0; }
        
        p a { color: #00f2fe; text-decoration: none; font-weight: bold; }
        p a:hover { text-decoration: underline; }
        
        .close-btn {
            background-color: #ff4c4c;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            cursor: pointer;
            float: left;
            font-weight: bold;
        }
        .close-btn:hover { background-color: #ff1c1c; }

        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: fill 0.2s, stroke-width 0.2s;
        }
        
        .node circle:hover { 
            fill: #00f2fe !important; 
            stroke-width: 4px;
        }
        
        .node text {
            font-size: 14px;
            fill: white;
            pointer-events: none; 
            font-weight: bold;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        
        .link {
            stroke: #666;
            stroke-opacity: 0.6;
            stroke-width: 2px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            #info-panel { padding: 20px; }
            .node text { font-size: 12px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/noal-alex/noal_interactive_sites/refs/heads/main/logo_100.png" 
         alt="לוגו התנועה" 
         style="position: absolute; top: 20px; left: 20px; width: 250px; max-width: 40%; z-index: 100;">
    
    <svg id="graph-container" width="100vw" height="100vh"></svg>

    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">סגור X</button>
        <h2 id="panel-title" style="margin-top: 40px;">נושא</h2>
        <div id="panel-text">מידע יופיע כאן.</div>
        <div id="panel-video" style="margin-top: 20px;"></div>
    </div>

    <script>
        // =====================================================================
        // YOUR GOOGLE SHEETS CSV URLS
        // =====================================================================
        const nodesCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=0&single=true&output=csv"; 
        const linksCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=389930858&single=true&output=csv";
        // =====================================================================

        // Initialize dimensions
        let width = window.innerWidth;
        let height = window.innerHeight;

        const svg = d3.select("#graph-container");
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
            
        svg.call(zoom);
        
        const linksGroup = g.append("g").attr("class", "links");
        const nodesGroup = g.append("g").attr("class", "nodes");

        function openPanel(data) {
            document.getElementById("panel-title").innerText = data.id;
            document.getElementById("panel-text").innerHTML = data.text || "אין מידע זמין.";
            
            const videoContainer = document.getElementById("panel-video");
            if (data.video && data.video.trim() !== "") {
                // Adjust iframe height for responsive panel
                videoContainer.innerHTML = `<iframe width="100%" height="315" src="${data.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = "";
            }
            document.getElementById("info-panel").classList.add("open");
        }

        function closePanel() {
            document.getElementById("info-panel").classList.remove("open");
            document.getElementById("panel-video").innerHTML = ""; 
        }

        let allNodes = [];
        let allLinks = [];
        let simulation;
        let currentCenterId = null;

        Promise.all([
            d3.csv(nodesCsvUrl),
            d3.csv(linksCsvUrl)
        ]).then(function(files) {
            
            allNodes = files[0].map(d => {
                d.id = d.id ? d.id.trim() : "";
                d.radius = +d.radius || 30;
                return d;
            }).filter(d => d.id !== "");
            
            let validNodeIds = new Set(allNodes.map(n => n.id));

            allLinks = files[1].map(d => {
                d.source = d.source ? d.source.trim() : "";
                d.target = d.target ? d.target.trim() : "";
                return d;
            }).filter(d => validNodeIds.has(d.source) && validNodeIds.has(d.target));

            simulation = d3.forceSimulation()
                .force("link", d3.forceLink().id(d => d.id).distance(160)) 
                .force("charge", d3.forceManyBody().strength(-600)) 
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 40))
                .alphaDecay(0.06); 

            if (allNodes.length > 0) {
                currentCenterId = allNodes[0].id;
                updateGraph(currentCenterId);
            }

        }).catch(function(error) {
            console.error("Data Load Error:", error);
        });

        function updateGraph(centerNodeId) {
            let activeLinks = allLinks.filter(l => {
                let sourceId = l.source.id || l.source;
                let targetId = l.target.id || l.target;
                return sourceId === centerNodeId || targetId === centerNodeId;
            });

            let activeNodeIds = new Set([centerNodeId]);
            activeLinks.forEach(l => {
                activeNodeIds.add(l.source.id || l.source);
                activeNodeIds.add(l.target.id || l.target);
            });
            let activeNodes = allNodes.filter(n => activeNodeIds.has(n.id));

            const linkSelection = linksGroup.selectAll(".link")
                .data(activeLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);

            const linkElements = linkSelection.join(
                enter => enter.append("line").attr("class", "link").attr("stroke-opacity", 0).call(enter => enter.transition().duration(500).attr("stroke-opacity", 0.6)),
                update => update,
                exit => exit.transition().duration(300).attr("stroke-opacity", 0).remove()
            );

            const nodeSelection = nodesGroup.selectAll(".node")
                .data(activeNodes, d => d.id);

            const nodeEnter = nodeSelection.enter().append("g")
                .attr("class", "node")
                .attr("transform", `translate(${width/2},${height/2})`)
                .attr("opacity", 0)
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

            nodeEnter.append("circle")
                .attr("r", 0)
                .attr("fill", d => d.color || "#4facfe")
                .on("click", (event, d) => handleNodeClick(d));

            nodeEnter.append("text")
                .attr("dy", d => d.radius + 20)
                .attr("text-anchor", "middle")
                .text(d => d.id)
                .style("opacity", 0);

            const nodeElements = nodeEnter.merge(nodeSelection);
            nodeElements.transition().duration(500).attr("opacity", 1);
            nodeElements.select("circle").transition().duration(500)
                .attr("r", d => d.id === centerNodeId ? d.radius * 1.5 : d.radius);
            nodeElements.select("text").transition().duration(500)
                .attr("dy", d => (d.id === centerNodeId ? d.radius * 1.5 : d.radius) + 25)
                .style("opacity", 1);

            nodeSelection.exit().transition().duration(300).attr("opacity", 0).remove();

            simulation.nodes(activeNodes);
            simulation.force("link").links(activeLinks);
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            });

            svg.transition().duration(750).call(
                zoom.transform, 
                d3.zoomIdentity.translate(width/2, height/2).scale(0.8).translate(-width/2, -height/2)
            );
        }

        function handleNodeClick(d) {
            openPanel(d);
            let connectionCount = allLinks.filter(l => {
                let sourceId = l.source.id || l.source;
                let targetId = l.target.id || l.target;
                return sourceId === d.id || targetId === d.id;
            }).length;

            if (d.id !== currentCenterId && connectionCount > 1) {
                currentCenterId = d.id;
                updateGraph(currentCenterId);
            }
        }

        function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

        // Resize Listener for Responsive Handling
        window.addEventListener("resize", () => {
            width = window.innerWidth;
            height = window.innerHeight;
            svg.attr("width", width).attr("height", height);
            if (simulation) {
                simulation.force("center", d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        });
    </script>
</body>
</html>
