<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Bellefair&family=Varela+Round&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שוק האנרגיה והמלחמה - Interactive Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-main: #2b2529;
            --bg-panel: #3d353c;
            --text-main: #ffffff;
            --text-dim: #f0e6d6;
            --primary: #e0b777;
            --secondary: #f2e7c4;
            --danger: #ff4c4c;
            --danger-hover: #ff1c1c;
            --link-color: #8c8279;
            --loader-border: #3d353c;
            --visited-tick: #7ed99b;
            --font-main: 'Assistant', sans-serif;
            --font-headers: 'Bellefair', serif; /* A classic, elegant look for titles */
        }

        body {
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: grab;
            font-family: var(--font-main);
        }
        body:active { cursor: grabbing; }

        /* --- פאנל מידע --- */
        #info-panel {
            position: absolute;
            top: 0;
            right: -100%;
            width: 600px;
            max-width: 100%;
            height: 100vh;
            background-color: var(--bg-panel);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
            overflow-y: auto;
        }
        #info-panel.open { right: 0; }

        h2 {
            margin-top: 0;
            color: var(--primary);
            font-size: 26px;
            line-height: 1.2;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }
        #panel-text {
            line-height: 1.8;
            font-size: 17px;
            color: var(--text-dim);
            margin-top: 20px;
        }
        #panel-text b { color: var(--primary); }
        p a { color: var(--secondary); text-decoration: none; font-weight: bold; }
        p a:hover { text-decoration: underline; }

        h2, #panel-title {
            font-family: var(--font-headers);
            font-weight: 700;
        }

        .close-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: left;
            font-weight: bold;
            transition: background 0.2s;
        }
        .close-btn:hover { background-color: var(--danger-hover); }

        /* --- גרף D3 --- */
        .node circle {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 2px;
            transition: fill 0.2s, stroke-width 0.2s;
        }
        .node circle:hover {
            fill: var(--secondary) !important;
            stroke-width: 4px;
        }
        .node text {
            font-size: 14px;
            fill: white;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 1px 1px 4px black, -1px -1px 4px black;
        }
        .node .tick-mark {
            font-size: 13px;
            fill: var(--visited-tick);
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.9);
            opacity: 0;
        }
        .node .tick-mark.visible { opacity: 1; }

        .link {
            stroke: var(--link-color);
            stroke-opacity: 0.4;
            stroke-width: 2px;
        }

        @media (max-width: 768px) {
            #info-panel { width: 100%; padding: 20px; }
            .node text { font-size: 11px; }
        }

        /* --- מסך טעינה --- */
        #loader-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid var(--loader-border);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loader-text { margin-top: 20px; color: var(--primary); font-size: 18px; font-weight: bold; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- הודעת שגיאה --- */
        #error-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 76, 76, 0.15);
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1500;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #panel-image {
            max-width: 100%; max-height: 350px; width: auto;
            margin-top: 20px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none; object-fit: contain;
        }

        /* =============================================
           כפתורים שמאל תחתון
        ============================================= */
        #toggle-mode-btn {
            position: absolute;
            bottom: 28px;
            left: 20px;
            z-index: 100;
            background-color: var(--bg-panel);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: background 0.2s, color 0.2s, transform 0.15s;
            white-space: nowrap;
        }
        #toggle-mode-btn:hover {
            background-color: var(--primary);
            color: var(--bg-main);
            transform: scale(1.05);
        }
        #toggle-mode-btn.full-mode {
            background-color: var(--primary);
            color: var(--bg-main);
        }

        #reset-progress-btn {
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 100;
            background-color: transparent;
            color: rgba(224, 183, 119, 0.5);
            border: 1px solid rgba(224, 183, 119, 0.3);
            padding: 7px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            white-space: nowrap;
        }
        #reset-progress-btn:hover {
            color: var(--danger);
            border-color: var(--danger);
            background-color: rgba(255, 76, 76, 0.08);
        }

        /* פירורי לחם */
        #breadcrumb-bar {
            position: absolute;
            top: 120px;
            left: 20px;
            right: auto;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: rgba(43, 37, 41, 0.75);
            border: 1px solid rgba(224, 183, 119, 0.35);
            border-radius: 30px;
            padding: 7px 18px;
            backdrop-filter: blur(4px);

            /* The Safety Net */
            max-width: 80vw;      /* Don't let it cover more than 80% of the screen */
            overflow-x: auto;     /* Allow swiping if names are long */
            white-space: nowrap;  /* Keep it all on one line */
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }

        #breadcrumb-bar::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome/Safari */
        }

        .bc-item {
            color: rgba(240, 230, 214, 0.6);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            padding: 2px 6px;
            border-radius: 20px;
            transition: color 0.2s, background 0.2s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bc-item:hover {
            color: var(--primary);
            background-color: rgba(224, 183, 119, 0.1);
        }
        .bc-item.bc-current {
            color: var(--primary);
            font-weight: bold;
            cursor: default;
            background: none;
        }
        .bc-separator {
            color: rgba(224, 183, 119, 0.35);
            font-size: 13px;
            user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/noal-alex/noal_interactive_sites/refs/heads/main/assets/logo_100.png"
         alt="לוגו התנועה"
         style="position: absolute; top: 20px; left: 20px; width: 220px; max-width: 35%; z-index: 100;">

    <div id="loader-container">
        <div class="spinner"></div>
        <div class="loader-text">טוען נתונים...</div>
    </div>

    <div id="error-message" style="display: none;">
        שגיאה בטעינת הנתונים. אנא רענן את העמוד או נסה שוב מאוחר יותר.
    </div>

    <div id="breadcrumb-bar"></div>

    <svg id="graph-container" width="100vw" height="100vh"></svg>

    <button id="reset-progress-btn" onclick="resetProgress()">↺ איפוס התקדמות</button>
    <button id="toggle-mode-btn" onclick="toggleMode()">הצג את כל הנקודות 🕸 </button>

    <div id="info-panel">
        <button class="close-btn" onclick="closePanel()">סגור X</button>
        <h2 id="panel-title" style="margin-top: 50px;">נושא</h2>
        <div id="panel-text">מידע יופיע כאן.</div>
        <img id="panel-image" src="" alt="תמונת נושא">
        <div id="panel-video" style="margin-top: 25px;"></div>
    </div>

    <script>
        const cssVars = getComputedStyle(document.documentElement);
        const primaryColor = cssVars.getPropertyValue('--primary').trim();

        const STORAGE_KEY = "noal_visited_nodes";
        const SHOW_BREADCRUMBS = false; // Change to true when you're ready!

        const nodesCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=0&single=true&output=csv";
        const linksCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTuF0csf_5-brKojkg2-AHN76hTmbAv6c8Whw3fcWAGpf-0-gRqGC5bCFnD_ogBN5VMG0Y4ZQa-u5I/pub?gid=389930858&single=true&output=csv";

        let width = window.innerWidth;
        let height = window.innerHeight;
        let isMobile = window.innerWidth <= 768;
        let radiusScale = isMobile ? 1.3 : 1;

        /* =============================================
           visited nodes — localStorage
        ============================================= */
        let visitedNodes = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));

        function markVisited(nodeId) {
            visitedNodes.add(nodeId);
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...visitedNodes]));
        }

        function resetProgress() {
            if (!confirm("לאפס את כל ההתקדמות? הסימונים ימחקו.")) return;
            visitedNodes.clear();
            localStorage.removeItem(STORAGE_KEY);
            // נקה את כל הווים הנראים
            nodesGroup.selectAll(".tick-mark").classed("visible", false);
        }

        function getTickX(r) { return r * 0.65; }
        function getTickY(r) { return -r * 0.65; }

        /* =============================================
           D3 setup
        ============================================= */
        const svg = d3.select("#graph-container");
        const g = svg.append("g");

        const defs = svg.append("defs");
        defs.append("clipPath")
            .attr("id", "circle-clip")
            .attr("clipPathUnits", "objectBoundingBox")
            .append("circle")
            .attr("cx", 0.5).attr("cy", 0.5).attr("r", 0.5);

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => { g.attr("transform", event.transform); });

        svg.call(zoom);

        const linksGroup = g.append("g").attr("class", "links");
        const nodesGroup = g.append("g").attr("class", "nodes");

        /* =============================================
           מצב תצוגה + פירורי לחם
        ============================================= */
        let isFullMode = true;
        let navHistory = [];

        function toggleMode() {
            isFullMode = !isFullMode;
            const btn = document.getElementById("toggle-mode-btn");
            if (isFullMode) {
                btn.textContent = "🎯 חזור למצב ממוקד";
                btn.classList.add("full-mode");
                showFullGraph();
            } else {
                btn.textContent = "הצג את כל הנקודות 🕸 ";
                btn.classList.remove("full-mode");
                // Ensure currentCenterId exists, otherwise use the first node
                updateGraph(currentCenterId || allNodes[0].id); 
            }
        }

        function buildNodeGroup(selection, centerNodeId) {
            selection.append("circle")
                .attr("r", 0)
                .attr("fill", d => d.color || primaryColor)
                .on("click", (e, d) => handleNodeClick(d));

            selection.append("image")
                .attr("href", d => d.image ? d.image.trim() : "")
                .attr("clip-path", "url(#circle-clip)")
                .attr("preserveAspectRatio", "xMidYMid slice")
                .style("pointer-events", "none");

            selection.append("text")
                .attr("dy", d => d.radius + 20)
                .attr("text-anchor", "middle")
                .text(d => d.id);

            // וו visited
            selection.append("text")
                .attr("class", d => "tick-mark" + (visitedNodes.has(d.id) ? " visible" : ""))
                .attr("x", d => getTickX(centerNodeId && d.id === centerNodeId ? d.radius * 1.3 : d.radius))
                .attr("y", d => getTickY(centerNodeId && d.id === centerNodeId ? d.radius * 1.3 : d.radius))
                .attr("text-anchor", "middle")
                .text("✓");
        }

        function applyNodeTransitions(nodeElements, centerNodeId) {
            const isFull = !centerNodeId;
            nodeElements.transition().duration(500).attr("opacity", 1);

            nodeElements.select("circle").transition().duration(500)
                .attr("r", d => (!isFull && d.id === centerNodeId) ? d.radius * 1.3 : d.radius);

            nodeElements.select("text").transition().duration(500)
                .attr("dy", d => d.id === centerNodeId ? d.radius * 1.3 + 20 : d.radius + 20);

            nodeElements.select("image").transition().duration(500)
                .attr("x", d => (!isFull && d.id === centerNodeId) ? -d.radius * 1.3 : -d.radius)
                .attr("y", d => (!isFull && d.id === centerNodeId) ? -d.radius * 1.3 : -d.radius)
                .attr("width", d => (!isFull && d.id === centerNodeId) ? d.radius * 2.6 : d.radius * 2)
                .attr("height", d => (!isFull && d.id === centerNodeId) ? d.radius * 2.6 : d.radius * 2);

            nodeElements.select(".tick-mark")
                .classed("visible", d => visitedNodes.has(d.id))
                .transition().duration(500)
                .attr("x", d => getTickX((!isFull && d.id === centerNodeId) ? d.radius * 1.3 : d.radius))
                .attr("y", d => getTickY((!isFull && d.id === centerNodeId) ? d.radius * 1.3 : d.radius));
        }

        function showFullGraph() {
            const linkSelection = linksGroup.selectAll(".link").data(allLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            const linkElements = linkSelection.join("line").attr("class", "link").attr("stroke-opacity", 0.6);

            const nodeSelection = nodesGroup.selectAll(".node").data(allNodes, d => d.id);
            const nodeEnter = nodeSelection.enter().append("g")
                .attr("class", "node").attr("opacity", 0)
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

            buildNodeGroup(nodeEnter, null);

            const nodeElements = nodeEnter.merge(nodeSelection);
            applyNodeTransitions(nodeElements, null);
            nodeSelection.exit().remove();

            simulation.nodes(allNodes);
            simulation.force("link").links(allLinks);
            simulation.force("charge", d3.forceManyBody().strength(-1200 * radiusScale));
            simulation.force("collide", d3.forceCollide().radius(d => d.radius + 60));
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                             .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            });
            simulation.on("end.fit", () => { 
                fitToNodes(allNodes); 
                simulation.on("end.fit", null); 
            });
        }

        /* --- פירורי לחם --- */
        function pushBreadcrumb(nodeData) {
            const existingIdx = navHistory.findIndex(h => h.id === nodeData.id);
            if (existingIdx !== -1) {
                navHistory = navHistory.slice(0, existingIdx + 1);
            } else {
                navHistory.push({ id: nodeData.id, data: nodeData });
            }
            renderBreadcrumb();
        }

        function renderBreadcrumb() {
            if (!SHOW_BREADCRUMBS) return; // This stops the function immediately
            const bar = document.getElementById("breadcrumb-bar");
            bar.innerHTML = "";
            
            // We want the last 4 items
            const MAX_VISIBLE = 4; 
            let displayItems = navHistory;
            let showingEllipsis = false;

            if (navHistory.length > MAX_VISIBLE) {
                // Take the last 4
                displayItems = navHistory.slice(-MAX_VISIBLE);
                showingEllipsis = true;
            }

            // 1. If we truncated the list, show an ellipsis (...)
            if (showingEllipsis) {
                const ell = document.createElement("span");
                ell.className = "bc-item";
                ell.textContent = "...";
                // Optional: Clicking '...' takes you back to the very first node (Home)
                ell.addEventListener("click", () => {
                    const firstNode = navHistory[0];
                    handleNodeClick(firstNode.data);
                });
                bar.appendChild(ell);

                const sep = document.createElement("span");
                sep.className = "bc-separator";
                sep.textContent = "←";
                bar.appendChild(sep);
            }

            // 2. Render the display items
            displayItems.forEach((item, idx) => {
                const isLast = idx === displayItems.length - 1;
                const span = document.createElement("span");
                span.className = "bc-item" + (isLast ? " bc-current" : "");
                span.textContent = item.id;

                if (!isLast) {
                    span.addEventListener("click", () => {
                        // Find the index in the ORIGINAL full history
                        const originalIdx = navHistory.findIndex(h => h.id === item.id);
                        // Cut the history to that point
                        navHistory = navHistory.slice(0, originalIdx + 1);
                        
                        renderBreadcrumb();
                        currentCenterId = item.id;
                        isFullMode = false;
                        
                        // Update UI
                        const btn = document.getElementById("toggle-mode-btn");
                        btn.textContent = "הצג את כל הנקודות 🕸 ";
                        btn.classList.remove("full-mode");
                        
                        updateGraph(currentCenterId);
                        openPanel(item.data);
                    });
                }
                bar.appendChild(span);

                if (!isLast) {
                    const sep = document.createElement("span");
                    sep.className = "bc-separator";
                    sep.textContent = "←";
                    bar.appendChild(sep);
                }
            });

            // Auto-scroll to the end (the newest item)
            bar.scrollLeft = bar.scrollWidth;
        }

        /* --- פאנל --- */
        function openPanel(data) {
            document.getElementById("panel-title").innerText = data.id;
            document.getElementById("panel-text").innerHTML = data.text || "אין מידע זמין.";
            const panelImg = document.getElementById("panel-image");
            const imageUrl = data.panelImage ? data.panelImage.trim() : "";
            if (imageUrl !== "") { panelImg.src = imageUrl; panelImg.style.display = "block"; }
            else { panelImg.style.display = "none"; }
            const videoContainer = document.getElementById("panel-video");
            if (data.video && data.video.trim() !== "") {
                videoContainer.innerHTML = `<iframe width="100%" height="250" src="${data.video}" frameborder="0" allowfullscreen></iframe>`;
            } else { videoContainer.innerHTML = ""; }
            document.getElementById("info-panel").classList.add("open");
            if (!isMobile) setTimeout(() => {
                const nodes = isFullMode ? allNodes : (simulation ? simulation.nodes() : []);
                if (nodes.length) fitToNodes(nodes);
            }, 450);
        }

        function closePanel() {
            document.getElementById("info-panel").classList.remove("open");
            document.getElementById("panel-video").innerHTML = "";
            document.getElementById("panel-image").src = "";
            if (!isMobile) setTimeout(() => {
                const nodes = isFullMode ? allNodes : (simulation ? simulation.nodes() : []);
                if (nodes.length) fitToNodes(nodes);
            }, 450);
        }

        let allNodes = [];
        let allLinks = [];
        let simulation;
        let currentCenterId = null;

        const loader = document.getElementById("loader-container");
        const errorMessage = document.getElementById("error-message");

        Promise.all([d3.csv(nodesCsvUrl), d3.csv(linksCsvUrl)])
            .then(function(files) {
                allNodes = files[0].map(d => {
                    d.id = d.id ? d.id.trim() : "";
                    d.radius = (+d.radius || 30) * radiusScale;
                    return d;
                }).filter(d => d.id !== "");

                let validNodeIds = new Set(allNodes.map(n => n.id));
                allLinks = files[1].map(d => {
                    d.source = d.source ? d.source.trim() : "";
                    d.target = d.target ? d.target.trim() : "";
                    return d;
                }).filter(d => validNodeIds.has(d.source) && validNodeIds.has(d.target));

                simulation = d3.forceSimulation()
                    .force("link", d3.forceLink().id(d => d.id).distance(150 * radiusScale))
                    .force("charge", d3.forceManyBody().strength(-600 * radiusScale))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("collide", d3.forceCollide().radius(d => d.radius + 30))
                    .alphaDecay(0.05);

                if (allNodes.length > 0) {
                    const largestNode = allNodes.reduce((max, node) => node.radius > max.radius ? node : max);
                    currentCenterId = largestNode.id;
                    
                    // 1. Mark as visited
                    markVisited(largestNode.id);
                    
                    // 2. Start with the FULL graph instead of updateGraph
                    showFullGraph(); 

                    // 3. Sync the button appearance
                    const btn = document.getElementById("toggle-mode-btn");
                    btn.textContent = "🎯 עבור למצב ממוקד";
                    btn.classList.add("full-mode");

                    // 4. Still open the panel and breadcrumbs for the "main" node
                    pushBreadcrumb(largestNode);
                    openPanel(largestNode);
                }

                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
            })
            .catch(() => { errorMessage.style.display = "block"; loader.style.display = "none"; });

        function updateGraph(centerNodeId) {
            // 1. Filter the data
            let activeLinks = allLinks.filter(l => (l.source.id || l.source) === centerNodeId || (l.target.id || l.target) === centerNodeId);
            let activeNodeIds = new Set([centerNodeId]);
            activeLinks.forEach(l => {
                activeNodeIds.add(l.source.id || l.source);
                activeNodeIds.add(l.target.id || l.target);
            });
            let activeNodes = allNodes.filter(n => activeNodeIds.has(n.id));

            // 2. Update the visual elements
            const linkSelection = linksGroup.selectAll(".link").data(activeLinks, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            const linkElements = linkSelection.join("line").attr("class", "link").attr("stroke-opacity", 0.6);

            const nodeSelection = nodesGroup.selectAll(".node").data(activeNodes, d => d.id);
            const nodeEnter = nodeSelection.enter().append("g")
                .attr("class", "node").attr("opacity", 0)
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

            buildNodeGroup(nodeEnter, centerNodeId);

            const nodeElements = nodeEnter.merge(nodeSelection);
            applyNodeTransitions(nodeElements, centerNodeId);
            nodeSelection.exit().remove();

            // 3. Reset the simulation forces
            simulation.nodes(activeNodes);
            simulation.force("link").links(activeLinks);
            simulation.force("charge", d3.forceManyBody().strength(-600 * radiusScale));
            simulation.force("collide", d3.forceCollide().radius(d => d.radius + 30));
            
            // 4. THE FIX: Kickstart the simulation and force a zoom
            simulation.alpha(1).restart();

            // We use a small timeout to let the simulation calculate 
            // initial coordinates before we try to fit the screen to them.
            setTimeout(() => {
                fitToNodes(activeNodes);
            }, 100); 

            simulation.on("tick", () => {
                linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                            .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function fitToNodes(nodes) {
            if (nodes.length === 0) return;
            const padding = isMobile ? 30 : 100;

            const panelOpen = !isMobile && document.getElementById("info-panel").classList.contains("open");
            const panelWidth = panelOpen ? Math.min(600, window.innerWidth) : 0;
            const availableWidth = window.innerWidth - panelWidth;

            let minX = d3.min(nodes, d => d.x - d.radius - padding);
            let maxX = d3.max(nodes, d => d.x + d.radius + padding);
            let minY = d3.min(nodes, d => d.y - d.radius - padding);
            let maxY = d3.max(nodes, d => d.y + d.radius + (padding + 40));

            let graphW = maxX - minX;
            let graphH = maxY - minY;

            let fillRatio = isMobile ? 0.95 : 0.75;
            let calculatedScale = fillRatio / Math.max(graphW / availableWidth, graphH / window.innerHeight);
            let scale = Math.max(0.3, Math.min(1.2, calculatedScale));

            svg.transition().duration(800).ease(d3.easeCubicInOut).call(
                zoom.transform,
                d3.zoomIdentity
                    .translate(availableWidth / 2, window.innerHeight / 2)
                    .scale(scale)
                    .translate(-(minX + maxX) / 2, -(minY + maxY) / 2)
            );
        }

        function handleNodeClick(d) {
            const connectionCount = allLinks.filter(l => 
                (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
            ).length;

            // Check if we are going "back" (is the node already in our history?)
            const isGoingBack = navHistory.some(h => h.id === d.id);

            markVisited(d.id);
            nodesGroup.selectAll(".node").filter(n => n.id === d.id)
                .select(".tick-mark").classed("visible", true);

            pushBreadcrumb(d);

            if (d.id !== currentCenterId && connectionCount > 1) {
                currentCenterId = d.id;
                if (isFullMode) {
                    isFullMode = false;
                    const btn = document.getElementById("toggle-mode-btn");
                    btn.textContent = "הצג את כל הנקודות 🕸 ";
                    btn.classList.remove("full-mode");
                }
                updateGraph(currentCenterId);
            }

            // Only open the panel if we aren't navigating "up" the existing trail
            if (!isGoingBack) {
                openPanel(d);
            } else {
                closePanel(); // Optional: close it if they go back
            }
        }

        function dragstarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
        function dragended(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

        window.addEventListener("resize", () => {
            width = window.innerWidth; height = window.innerHeight;
            isMobile = width <= 768;
            svg.attr("width", width).attr("height", height);
        });
    </script>
</body>
</html>
